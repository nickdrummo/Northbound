swagger: "2.0"
info:
  title: Northbound - Order Creation SaaS API
  description: |
    A SaaS API for generating and managing standardized UBL 2.1 Order documents.
    This service facilitates the procurement process between Buyer and Seller parties.
  version: "1.0.0"

schemes:
  - https

host: northbound-w6b3.onrender.com
basePath: /

tags:
  - name: Health
  - name: Auth
  - name: Orders

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: |
      Supply a bearer token as: "Authorization: Bearer <token>"

paths:
  /health:
    get:
      tags: [Health]
      summary: Service Health Check
      description: Returns the aliveness status and basic runtime info for the service.
      responses:
        200:
          description: Service is operational
          schema:
            $ref: '#/definitions/HealthResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: User Login
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/LoginRequest'
      responses:
        200:
          description: Successful login
          schema:
            $ref: '#/definitions/AuthResponse'
        400:
          description: Missing or invalid fields
          schema:
            $ref: '#/definitions/StandardErrorResponse'
        401:
          description: Invalid credentials
          schema:
            $ref: '#/definitions/StandardErrorResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: User Registration
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/RegisterRequest'
      responses:
        201:
          description: User created
          schema:
            $ref: '#/definitions/AuthResponse'
        400:
          description: Missing or invalid fields
          schema:
            $ref: '#/definitions/StandardErrorResponse'

  /orders:
    post:
      tags: [Orders]
      summary: Generate and store UBL Order
      description: >
        Creates a new Order from structured JSON input, generates a UBL 2.1 Order XML document,
        stores it, and returns the created order identifier and XML.
      security:
        - bearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/OrderCreateRequest'
      responses:
        201:
          description: Order created and UBL XML generated successfully
          schema:
            $ref: '#/definitions/CreatedOrderResponse'
        400:
          description: Missing mandatory fields or validation error
          schema:
            $ref: '#/definitions/ValidationErrorResponse'
        422:
          description: UBL schema validation failure
          schema:
            $ref: '#/definitions/StandardErrorResponse'

    get:
      tags: [Orders]
      summary: List Orders
      description: Returns a list of orders for the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          type: string
          description: Optional filter by order status
      responses:
        200:
          description: List of order summaries
          schema:
            $ref: '#/definitions/OrderListResponse'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/StandardErrorResponse'

  /orders/recurring/{orderID}:
    delete:
      tags: [Orders]
      summary: Delete a recurring order
      description: Deletes a recurring order template and its associated order lines. Returns the deleted order ID.
      security:
        - bearerAuth: []
      produces:
        - application/json
      parameters:
        - in: path
          name: orderID
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: Recurring order deleted successfully
          schema:
            allOf:
              - $ref: '#/definitions/StandardResponse'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      orderID:
                        type: string
                        format: uuid
        404:
          description: Recurring order not found
          schema:
            $ref: '#/definitions/StandardErrorResponse'
        500:
          description: Internal server error
          schema:
            $ref: '#/definitions/StandardErrorResponse'

  /orders/{orderID}:
    get:
      tags: [Orders]
      summary: Retrieve Order by ID
      description: Returns the stored order object (including JSON and metadata) for a given ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orderID
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: Order found
          schema:
            $ref: '#/definitions/OrderGetResponse'
        404:
          description: Order not found
          schema:
            $ref: '#/definitions/StandardErrorResponse'

  /orders/{orderID}/xml:
    get:
      tags: [Orders]
      summary: Retrieve UBL Order XML by ID
      description: Returns the UBL 2.1 Order XML document for a given order ID.
      security:
        - bearerAuth: []
      produces:
        - application/xml
      parameters:
        - in: path
          name: orderID
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: UBL XML document
          schema:
            type: string
        404:
          description: Order not found
          schema:
            $ref: '#/definitions/StandardErrorResponse'

definitions:
  # --- Generic envelopes ---
  StandardResponse:
    type: object
    properties:
      success:
        type: boolean
        example: true
      message:
        type: string
        example: Operation completed successfully.
      data:
        type: object
        description: Payload specific to the endpoint.
      error:
        type: object
        description: Error information if success is false.

  StandardErrorResponse:
    allOf:
      - $ref: '#/definitions/StandardResponse'
      - type: object
        properties:
          success:
            example: false
          data:
            example: null
          error:
            $ref: '#/definitions/ErrorDetail'

  ValidationErrorResponse:
    allOf:
      - $ref: '#/definitions/StandardErrorResponse'
      - type: object
        properties:
          error:
            allOf:
              - $ref: '#/definitions/ErrorDetail'
              - type: object
                properties:
                  validationErrors:
                    type: array
                    items:
                      $ref: '#/definitions/ValidationError'

  ErrorDetail:
    type: object
    properties:
      code:
        type: string
        example: VALIDATION_ERROR
      message:
        type: string
        example: One or more fields are invalid.

  ValidationError:
    type: object
    properties:
      field:
        type: string
        example: buyer.external_id
      message:
        type: string
        example: buyer.external_id is required

  HealthStatus:
    type: object
    properties:
      status:
        type: string
        example: UP
      uptime:
        type: string
        example: 12h 30m
      version:
        type: string
        example: 1.0.0
      dbStatus:
        type: string
        example: UP

  HealthResponse:
    allOf:
      - $ref: '#/definitions/StandardResponse'
      - type: object
        properties:
          data:
            $ref: '#/definitions/HealthStatus'

  # --- Auth ---
  LoginRequest:
    type: object
    required: [email, password]
    properties:
      email:
        type: string
        format: email
      password:
        type: string

  RegisterRequest:
    type: object
    required: [email, password, passwordConfirm]
    properties:
      email:
        type: string
        format: email
      password:
        type: string
      passwordConfirm:
        type: string

  AuthToken:
    type: object
    properties:
      userID:
        type: integer
        example: 123
      token:
        type: string
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

  AuthResponse:
    allOf:
      - $ref: '#/definitions/StandardResponse'
      - type: object
        properties:
          data:
            $ref: '#/definitions/AuthToken'

  # --- Orders (matches API: external_id, name, order_lines with line_id, unit_price, etc.) ---
  OrderCreateRequest:
    type: object
    required: [buyer, seller, currency, issue_date, order_lines]
    properties:
      buyer:
        $ref: '#/definitions/Party'
      seller:
        $ref: '#/definitions/Party'
      currency:
        type: string
        description: ISO 4217 currency code
        example: AUD
      issue_date:
        type: string
        format: date
        description: Order date (YYYY-MM-DD)
        example: "2025-03-10"
      order_note:
        type: string
        description: Optional note for the order
      order_lines:
        type: array
        minItems: 1
        items:
          $ref: '#/definitions/OrderLine'

  Party:
    type: object
    required: [external_id, name]
    properties:
      external_id:
        type: string
        description: Unique identifier for the party (e.g. from your system)
        example: BUYER-001
      name:
        type: string
        example: Example Buyer Pty Ltd
      email:
        type: string
        format: email
      street:
        type: string
      city:
        type: string
      country:
        type: string
        description: ISO 3166-1 alpha-2 country code
        example: AU
      postal_code:
        type: string

  OrderLine:
    type: object
    required: [line_id, description, quantity, unit_price]
    properties:
      line_id:
        type: string
        description: Line identifier (e.g. "1", "2")
        example: "1"
      description:
        type: string
        example: Wireless Keyboard
      quantity:
        type: number
        minimum: 0
        example: 2
      unit_price:
        type: number
        minimum: 0
        example: 49.99
      unit_code:
        type: string
        description: Unit of measure (defaults to EA if omitted)
        example: EA

  CreatedOrder:
    type: object
    properties:
      orderID:
        type: string
        format: uuid
      ubl_xml:
        type: string
        description: Generated UBL 2.1 Order XML document

  CreatedOrderResponse:
    allOf:
      - $ref: '#/definitions/StandardResponse'
      - type: object
        properties:
          data:
            $ref: '#/definitions/CreatedOrder'

  OrderSummary:
    type: object
    properties:
      orderID:
        type: string
        format: uuid
      status:
        type: string
        example: CREATED
      buyerName:
        type: string
      sellerName:
        type: string
      totalAmount:
        type: number
        format: float
      currencyCode:
        type: string
        example: AUD
      createdAt:
        type: string
        format: date-time

  OrderObject:
    type: object
    properties:
      orderID:
        type: string
        format: uuid
      status:
        type: string
        example: CREATED
      orderJson:
        $ref: '#/definitions/OrderCreateRequest'
      ublXml:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  OrderListResponse:
    allOf:
      - $ref: '#/definitions/StandardResponse'
      - type: object
        properties:
          data:
            type: array
            items:
              $ref: '#/definitions/OrderSummary'

  OrderGetResponse:
    allOf:
      - $ref: '#/definitions/StandardResponse'
      - type: object
        properties:
          data:
            $ref: '#/definitions/OrderObject'
