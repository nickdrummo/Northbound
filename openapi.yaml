openapi: 3.0.3
info:
  title: Northbound - Order Creation SaaS API
  description: |
    A SaaS API for generating and managing standardized UBL 2.1 Order documents.
    This service facilitates the procurement process between Buyer and Seller parties.

    **Paths:** Order routes are mounted at **`/orders`**. The same router is also mounted at **`/v1/orders`**
    for backward compatibility — every operation is available under both prefixes (e.g. `PUT /orders/{id}/change`
    and `PUT /v1/orders/{id}/change` are equivalent).
  version: "1.2.0"

servers:
  - url: https://northbound-w6b3.onrender.com
    description: Production (Render)
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: Orders
  - name: Integrations
    description: >
      Proxies to external ecosystem services (e.g. DevEx Category 2 Despatch).
      Requires server env DEVEX_API_KEY. Same paths under /v1/orders/....
  - name: Parties

security:
  - bearerAuth: []

paths:
  /:
    get:
      tags: [Health]
      summary: Redirect to API documentation
      description: The service root redirects browsers and clients to the interactive OpenAPI UI.
      security: []
      responses:
        "302":
          description: Redirect to `/docs`
          headers:
            Location:
              schema:
                type: string
                example: /docs

  /health:
    get:
      tags: [Health]
      summary: Service Health Check
      description: Returns the aliveness status and basic runtime info for the service.
      security: []
      responses:
        "200":
          description: Service is operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: User Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Server misconfiguration (e.g. missing JWT secret) or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /auth/register:
    post:
      tags: [Auth]
      summary: User Registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Server misconfiguration (e.g. missing JWT secret) or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request Password Reset
      description: Sends a password reset token to the provided email address. Always returns 200 to prevent user enumeration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Request processed (regardless of whether the email exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset Password
      description: Resets the user's password using a valid one-time token received via email. Tokens expire after 1 hour.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "400":
          description: Invalid or expired token, or password too short
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: User Logout
      description: Logs out the current user by revoking the provided bearer token.
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Server misconfiguration or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
                
  /orders:
    post:
      tags: [Orders]
      summary: Generate and store UBL Order
      description: |
        Creates a new Order from structured JSON input, generates a UBL 2.1 Order XML document,
        stores it, and returns the created order identifier and XML.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        "201":
          description: Order created and UBL XML generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedOrderResponse"
        "400":
          description: Missing mandatory fields or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "422":
          description: UBL schema validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
    get:
      tags: [Orders]
      summary: List Orders
      description: Returns all order rows from storage (no query filters are applied).
      responses:
        "200":
          description: List of order rows from storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "500":
          description: Supabase not configured or list failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/generate:
    post:
      tags: [Orders]
      summary: Generate and store UBL Order (/generate alias)
      description: Generates and stores an order from structured JSON input.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        "201":
          description: Order created and UBL XML generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedOrderResponse"
        "400":
          description: Missing mandatory fields or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "422":
          description: UBL schema validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"


  /orders/recurring:
    post:
      tags: [Orders]
      summary: Create a recurring order
      description: Creates a recurring order template that repeats on a defined schedule. The order template is stored and can be retrieved, updated, or deleted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringOrderCreateRequest"
      responses:
        "201":
          description: Recurring order created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RecurringOrderObject"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/recurring/{orderID}:
    patch:
      tags: [Orders]
      summary: Update a recurring order
      description: Partially updates an existing recurring order template. Only provided fields are updated. If order_lines is provided, they replace all existing lines.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringOrderUpdateRequest"
      responses:
        "200":
          description: Recurring order updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RecurringOrderObject"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Recurring order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

    delete:
      tags: [Orders]
      summary: Delete a recurring order
      description: Deletes a recurring order template and its associated order lines. Returns the deleted order ID.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Recurring order deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          orderID:
                            type: string
                            format: uuid
        "404":
          description: Recurring order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"


  /orders/{orderID}:
    get:
      tags: [Orders]
      summary: Retrieve Order by ID
      description: Returns the stored order row for a given ID. Same path under `/v1/orders/{orderID}`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderGetResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or retrieval failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/xml:
    get:
      tags: [Orders]
      summary: Retrieve UBL Order XML by ID
      description: Returns the UBL 2.1 Order XML document for a given order ID.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: UBL XML document
          content:
            application/xml:
              schema:
                type: string
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/despatch/list:
    get:
      tags: [Integrations]
      summary: List Despatch Advice records (DevEx proxy)
      description: >
        Forwards to DevEx `GET /api/v1/despatch/list` with your team's `Api-Key`.
        Returns despatch advice documents associated with the API key.
        [DevEx Swagger](https://devex.cloud.tcore.network/api-docs/).
      security: []
      responses:
        "200":
          description: Passthrough JSON from DevEx (shape may vary)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid DevEx API key (upstream)
        "503":
          description: DEVEX_API_KEY not configured on Northbound server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/despatch:
    post:
      tags: [Integrations]
      summary: Create Despatch Advice from stored Order XML (DevEx proxy)
      description: >
        Loads this order's UBL Order XML (same as `GET /orders/{orderID}/xml`), then calls
        DevEx `POST /api/v1/despatch/create` with `Content-Type: application/xml`.
        Response status and body are passed through from DevEx.
      security: []
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: DevEx success (e.g. advice IDs)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid XML (upstream) or order not found
        "401":
          description: Missing or invalid DevEx API key (upstream)
        "404":
          description: Order not found in Northbound storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "503":
          description: DEVEX_API_KEY not configured on Northbound server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
    get:
      tags: [Integrations]
      summary: Retrieve Despatch Advice by advice ID or by order XML (DevEx proxy)
      description: >
        If query `adviceId` is set, forwards to DevEx `GET /api/v1/despatch/retrieve`
        with `search-type=advice-id`. Otherwise loads this order's UBL XML and uses
        `search-type=order` (query string may be large).
      security: []
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: adviceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: DevEx despatch advice UUID (preferred).
      responses:
        "200":
          description: Passthrough JSON from DevEx
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Order not found or advice not found (upstream)
        "503":
          description: DEVEX_API_KEY not configured on Northbound server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/party-country:
    patch:
      tags: [Orders]
      summary: Update buyer or seller country for an existing order
      description: >
        Updates the ISO country code on the buyer or seller party for this order and returns
        regenerated UBL XML. Order currency is not changed. Also available as
        `PATCH /v1/orders/{orderID}/party-country`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartyCountryRequest"
            examples:
              updateBuyerCountry:
                summary: Update buyer country
                value:
                  role: buyer
                  country: AU
      responses:
        "200":
          description: Party country updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePartyCountryResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Failed to update party country (e.g. Supabase or regeneration error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/change:
    put:
      tags: [Orders]
      summary: Replace an existing order (full payload)
      description: |
        Replaces the order with a full new body (same JSON shape as `POST /orders`), updates
        parties and line items, and returns regenerated UBL XML. The order **id** does not change.
        Requires Supabase env vars. Same path under `/v1/orders/{orderID}/change`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
            examples:
              fullReplace:
                summary: Full order body (same as create)
                value:
                  buyer:
                    external_id: BUYER-001
                    name: Example Buyer Pty Ltd
                  seller:
                    external_id: SELLER-001
                    name: Example Seller Pty Ltd
                  currency: AUD
                  issue_date: "2025-03-15"
                  order_note: Updated shipment
                  order_lines:
                    - line_id: "1"
                      description: Wireless Keyboard
                      quantity: 3
                      unit_price: 49.99
                      unit_code: EA
      responses:
        "200":
          description: Order updated; new UBL XML returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatedOrderResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"


  /orders/{orderID}/cancel:
    post:
      tags: [Orders]
      summary: Cancel an order
      description: |
        Deletes the order and its line items. Requires Supabase env vars.
        Same path under `/v1/orders/{orderID}/cancel`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelledOrderResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or cancel failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/response:
    post:
      tags: [Orders]
      summary: Generate UBL OrderResponse for an order
      description: >
        Verifies the order exists in storage, then returns a minimal UBL 2.1 **OrderResponse** document
        that references this order (`cac:OrderReference`), including a response code (e.g. ACCEPTED).
        Does not persist the document. Same path under `/v1/orders/{orderID}/response`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderResponseRequest"
      responses:
        "201":
          description: OrderResponse XML generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/OrderResponseCreated"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/detail:
    patch:
      tags: [Orders]
      summary: Patch order header fields (non-recurring)
      description: >
        Partially updates `currency`, `issue_date`, and/or `order_note` on a **non-recurring** order,
        then regenerates and returns UBL Order XML. Recurring templates must use
        `PATCH /orders/recurring/{orderID}`. Same path under `/v1/orders/{orderID}/detail`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderDetailPatchRequest"
      responses:
        "200":
          description: Order updated; new UBL Order XML returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/OrderDetailPatched"
        "400":
          description: Validation failed or order is recurring (use recurring patch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
  
  /orders/{orderID}/invoice:
    post:
      tags: [Orders]
      summary: Generate UBL Invoice from an order
      description: >
        Generates a UBL 2.1 Invoice document from a stored order. Pulls buyer, seller,
        and line items from storage, computes totals (with optional tax), and returns
        a full invoice with UBL XML. Does not persist the invoice document.
        Same path under `/v1/orders/{orderID}/invoice`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceRequest"
            examples:
              noTax:
                summary: Invoice with no tax
                value:
                  issue_date: "2026-04-22"
                  invoice_note: Thank you for your order
              withGST:
                summary: Invoice with 10% GST
                value:
                  issue_date: "2026-04-22"
                  tax_rate: 0.1
                  invoice_note: GST inclusive invoice
      responses:
        "201":
          description: UBL Invoice generated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/InvoiceResult"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or invoice generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /parties/buyers/{externalID}/orders:
    get:
      tags: [Parties]
      summary: List all orders for a buyer
      description: Returns every order in which the specified party appears as the buyer, together with its order lines.
      parameters:
        - name: externalID
          in: path
          required: true
          schema:
            type: string
          description: The buyer's external_id as stored in the parties table
      responses:
        "200":
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartySessionResponse"
        "404":
          description: No buyer with the given external ID exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /parties/sellers/{externalID}/orders:
    get:
      tags: [Parties]
      summary: List all orders for a seller
      description: Returns every order in which the specified party appears as the seller, together with its order lines.
      parameters:
        - name: externalID
          in: path
          required: true
          schema:
            type: string
          description: The seller's external_id as stored in the parties table
      responses:
        "200":
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartySessionResponse"
        "404":
          description: No seller with the given external ID exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /parties/buyers/{externalID}/report:
    get:
      tags: [Parties]
      summary: Spending report for a buyer
      description: |
        Returns an aggregated spending report for the specified buyer: total spend, order count,
        average order value, per-currency breakdowns, date range, and a summary of each order.
      parameters:
        - name: externalID
          in: path
          required: true
          schema:
            type: string
          description: The buyer's external_id
      responses:
        "200":
          description: Report generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyReportResponse"
        "404":
          description: No buyer with the given external ID exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /parties/sellers/{externalID}/report:
    get:
      tags: [Parties]
      summary: Sales report for a seller
      description: |
        Returns an aggregated sales report for the specified seller: total revenue, order count,
        average order value, per-currency breakdowns, date range, and a summary of each order.
      parameters:
        - name: externalID
          in: path
          required: true
          schema:
            type: string
          description: The seller's external_id
      responses:
        "200":
          description: Report generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyReportResponse"
        "404":
          description: No seller with the given external ID exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /v2/orders/{orderID}/party-country:
    patch:
      tags:
        - OrdersV2
      summary: Update buyer or seller country for an existing order
      description: >
        **Sprint 3 / API v2.** Updates the country field of the specified
        party (buyer or seller) for an existing order and returns the
        regenerated UBL XML. Currency remains unchanged.
      parameters:
        - name: orderID
          in: path
          required: true
          description: UUID of the order to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartyCountryRequest"
            examples:
              updateBuyerCountry:
                summary: Update buyer country
                value:
                  role: buyer
                  country: CN
      responses:
        "200":
          description: Order party country updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePartyCountryResponse"
              examples:
                success:
                  summary: Successful update
                  value:
                    success: true
                    message: Order party country updated successfully
                    data:
                      orderID: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                      role: buyer
                      country: CN
                      currency: AUD
                      issue_date: "2024-03-01"
                      order_note: Test note
                      buyer:
                        external_id: buyer-ext-1
                        name: Buyer Co
                        email: buyer@example.com
                        street: 1 Buyer St
                        city: Sydney
                        country: CN
                        postal_code: "2000"
                      seller:
                        external_id: seller-ext-1
                        name: Seller Co
                        email: seller@example.com
                        street: 2 Seller St
                        city: Melbourne
                        country: AU
                        postal_code: "3000"
                      order_lines:
                        - line_id: "1"
                          description: Widget A
                          quantity: 2
                          unit_price: 50
                          unit_code: EA
                        - line_id: "2"
                          description: Widget B
                          quantity: 1
                          unit_price: 100
                          unit_code: EA
                      ubl_xml: "<Order>3fa85f64-5717-4562-b3fc-2c963f66afa6</Order>"
                    error: null
        "400":
          description: Request body failed validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              examples:
                bodyNotObject:
                  summary: Request body is not a JSON object
                  value:
                    success: false
                    message: Validation failed
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      message: Request body failed validation
                      validationErrors:
                        - field: body
                          message: Request body must be a JSON object
                invalidRole:
                  summary: Invalid role value
                  value:
                    success: false
                    message: Validation failed
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      message: Request body failed validation
                      validationErrors:
                        - field: role
                          message: role is required and must be either buyer or seller
  
                missingCountry:
                  summary: Missing country
                  value:
                    success: false
                    message: Validation failed
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      message: Request body failed validation
                      validationErrors:
                        - field: country
                          message: country is required
  
                invalidCountryCode:
                  summary: Invalid country code
                  value:
                    success: false
                    message: Validation failed
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      message: Request body failed validation
                      validationErrors:
                        - field: country
                          message: country must be a valid ISO 3166-1 country code
  
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
              examples:
                orderNotFound:
                  summary: Order does not exist
                  value:
                    success: false
                    message: Order not found
                    data: null
                    error:
                      code: ORDER_NOT_FOUND
                      message: Order with the given ID does not exist.
  
        "500":
          description: Failed to update order party country
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
              examples:
                supabaseEnvMissing:
                  summary: Supabase environment variables missing
                  value:
                    success: false
                    message: Failed to update order party country
                    data: null
                    error:
                      code: UPDATE_ORDER_ERROR
                      message: SUPABASE_URL and SUPABASE_ANON_KEY must be set
                updateFailed:
                  summary: Unexpected update error
                  value:
                    success: false
                    message: Failed to update order party country
                    data: null
                    error:
                      code: UPDATE_ORDER_ERROR
                      message: "Failed to update buyer country: DB update failed"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Supply as: Authorization: Bearer <token>'

  schemas:
    StandardResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully.
        data:
          type: object
          nullable: true
          description: Payload specific to the endpoint.
        error:
          type: object
          nullable: true
          description: Error information if success is false.

    StandardErrorResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            success:
              example: false
            data:
              nullable: true
              example: null
            error:
              $ref: "#/components/schemas/ErrorDetail"

    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/StandardErrorResponse"
        - type: object
          properties:
            error:
              allOf:
                - $ref: "#/components/schemas/ErrorDetail"
                - type: object
                  properties:
                    validationErrors:
                      type: array
                      items:
                        $ref: "#/components/schemas/ValidationError"

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: One or more fields are invalid.

    ValidationError:
      type: object
      properties:
        field:
          type: string
          example: buyer.external_id
        message:
          type: string
          example: buyer.external_id is required

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: UP
        uptime:
          type: number
          description: Server uptime in seconds since process start
          example: 0
        version:
          type: string
          description: Application version (from npm package when set)
          example: "1.0.0"

    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/HealthStatus"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, passwordConfirm]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        passwordConfirm:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: The reset token received via email
        newPassword:
          type: string
          description: New password (minimum 8 characters)
          minLength: 8

    AuthToken:
      type: object
      properties:
        userID:
          type: integer
          example: 123
        token:
          type: string

    AuthResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthToken"

    OrderCreateRequest:
      type: object
      required: [buyer, seller, currency, issue_date, order_lines]
      properties:
        buyer:
          $ref: "#/components/schemas/Party"
        seller:
          $ref: "#/components/schemas/Party"
        currency:
          type: string
          description: ISO 4217 currency code
          example: AUD
        issue_date:
          type: string
          format: date
          description: Order date (YYYY-MM-DD)
          example: "2025-03-10"
        order_note:
          type: string
          description: Optional note for the order
        order_lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderLine"

    Party:
      type: object
      required: [external_id, name]
      properties:
        external_id:
          type: string
          description: Unique identifier for the party (e.g. from your system)
          example: BUYER-001
        name:
          type: string
          example: Example Buyer Pty Ltd
        email:
          type: string
          format: email
        street:
          type: string
        city:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: AU
        postal_code:
          type: string

    OrderLine:
      type: object
      required: [line_id, description, quantity, unit_price]
      properties:
        line_id:
          type: string
          description: Line identifier (e.g. "1", "2")
          example: "1"
        description:
          type: string
          example: Wireless Keyboard
        quantity:
          type: number
          minimum: 0
          example: 2
        unit_price:
          type: number
          minimum: 0
          example: 49.99
        unit_code:
          type: string
          description: Unit of measure (defaults to EA if omitted)
          example: EA

    CreatedOrder:
      type: object
      properties:
        orderID:
          type: string
          format: uuid
        ubl_xml:
          type: string
          description: Generated UBL 2.1 Order XML document

    CreatedOrderResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreatedOrder"

    UpdatedOrderResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreatedOrder"
              description: Same shape as create — orderID unchanged, ubl_xml regenerated

    CancelledOrder:
      type: object
      properties:
        orderID:
          type: string
          format: uuid
      required: [orderID]

    CancelledOrderResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CancelledOrder"

    OrderSummary:
      type: object
      description: >
        Raw order row(s) from storage (Supabase `orders` table). Fields follow the DB schema
        (e.g. `id`, `buyer_id`, `seller_id`, timestamps may use snake_case); not a denormalized DTO.
      additionalProperties: true

    OrderObject:
      type: object
      description: Same shape as a single list entry — raw order row from storage.
      additionalProperties: true

    OrderListResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/OrderSummary"

    OrderGetResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/OrderObject"


    RecurringOrderUpdateRequest:
      type: object
      minProperties: 1
      description: >
        Partial update for a recurring order. At least one property must be sent.
        If `order_lines` is present, it replaces all existing lines.
      properties:
        buyer:
          $ref: "#/components/schemas/Party"
        seller:
          $ref: "#/components/schemas/Party"
        currency:
          type: string
          description: ISO 4217 currency code (updates stored order currency)
          example: USD
        order_note:
          type: string
          nullable: true
        order_lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderLine"
        frequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY]
        recur_interval:
          type: integer
          minimum: 1
        recur_start_date:
          type: string
          format: date
        recur_end_date:
          type: string
          format: date
          nullable: true

    RecurringOrderCreateRequest:
      type: object
      required:
        - buyer
        - seller
        - currency
        - order_lines
        - frequency
        - recur_interval
        - recur_start_date
      properties:
        buyer:
          $ref: "#/components/schemas/Party"
        seller:
          $ref: "#/components/schemas/Party"
        currency:
          type: string
          example: AUD
        order_note:
          type: string
        order_lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderLine"
        frequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY]
          example: MONTHLY
        recur_interval:
          type: integer
          minimum: 1
          example: 2
        recur_start_date:
          type: string
          format: date
          example: "2026-04-01"
        recur_end_date:
          type: string
          format: date
          nullable: true
          example: "2026-12-31"

    RecurringOrderObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        buyer_id:
          type: string
          format: uuid
        seller_id:
          type: string
          format: uuid
        currency:
          type: string
          example: AUD
        order_note:
          type: string
          nullable: true
        is_recurring:
          type: boolean
          example: true
        frequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY]
        recur_interval:
          type: integer
          example: 1
        recur_start_date:
          type: string
          format: date
        recur_end_date:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time


    UpdatePartyCountryRequest:
      type: object
      required: [role, country]
      properties:
        role:
          type: string
          enum: [buyer, seller]
          example: buyer
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: AU

    UpdatedOrderPartyCountry:
      type: object
      properties:
        orderID:
          type: string
          format: uuid
        role:
          type: string
          enum: [buyer, seller]
          example: buyer
        country:
          type: string
          example: AU
        currency:
          type: string
          example: AUD
        issue_date:
          type: string
          format: date
          example: "2025-03-10"
        order_note:
          type: string
          example: Updated buyer country
        buyer:
          $ref: "#/components/schemas/Party"
        seller:
          $ref: "#/components/schemas/Party"
        order_lines:
          type: array
          items:
            $ref: "#/components/schemas/OrderLine"
        ubl_xml:
          type: string
          description: Regenerated UBL 2.1 Order XML document

    UpdatePartyCountryResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UpdatedOrderPartyCountry"

    OrderResponseRequest:
      type: object
      required: [response_code]
      properties:
        response_code:
          type: string
          description: Business outcome (e.g. ACCEPTED, REJECTED, CONDITIONALLY_ACCEPTED)
          example: ACCEPTED
        issue_date:
          type: string
          format: date
          description: Response document issue date; defaults to today (UTC) if omitted
        note:
          type: string
          description: Optional free-text note embedded in the UBL document

    OrderResponseCreated:
      type: object
      required: [orderID, responseID, ubl_xml]
      properties:
        orderID:
          type: string
          format: uuid
        responseID:
          type: string
          format: uuid
          description: New identifier for this OrderResponse document
        ubl_xml:
          type: string
          description: UBL 2.1 OrderResponse XML

    OrderDetailPatchRequest:
      type: object
      description: At least one property must be provided.
      minProperties: 1
      properties:
        currency:
          type: string
          description: ISO 4217 currency code
          example: USD
        issue_date:
          type: string
          format: date
        order_note:
          type: string
          nullable: true
          description: Set to null or empty string to clear the note

    OrderDetailPatched:
      type: object
      required: [orderID, currency, issue_date, ubl_xml]
      properties:
        orderID:
          type: string
          format: uuid
        currency:
          type: string
        issue_date:
          type: string
          format: date
        order_note:
          type: string
          nullable: true
        ubl_xml:
          type: string
          description: Regenerated UBL 2.1 Order XML

    PartySessionOrder:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
        currency:
          type: string
          example: AUD
        issue_date:
          type: string
          format: date
        order_note:
          type: string
          nullable: true
        is_recurring:
          type: boolean
          example: false
        order_lines:
          type: array
          items:
            $ref: "#/components/schemas/OrderLine"

    PartySessionData:
      type: object
      properties:
        party:
          $ref: "#/components/schemas/Party"
        role:
          type: string
          enum: [buyer, seller]
        orders:
          type: array
          items:
            $ref: "#/components/schemas/PartySessionOrder"

    PartySessionResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PartySessionData"

    PartyOrderSummary:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
        currency:
          type: string
          example: AUD
        issue_date:
          type: string
          format: date
        order_note:
          type: string
          nullable: true
        order_value:
          type: number
          description: Sum of quantity multiplied by unit_price for all lines on this order
          example: 149.97
        line_count:
          type: integer
          example: 2

    CurrencyBreakdown:
      type: object
      properties:
        order_count:
          type: integer
          example: 3
        total_value:
          type: number
          example: 449.91

    PartyReportData:
      type: object
      properties:
        party:
          $ref: "#/components/schemas/Party"
        role:
          type: string
          enum: [buyer, seller]
        order_count:
          type: integer
          example: 5
        total_value:
          type: number
          description: Sum of all order values rounded to two decimal places
          example: 749.85
        avg_order_value:
          type: number
          description: Average order value rounded to two decimal places
          example: 149.97
        currencies:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/CurrencyBreakdown"
          description: Per-currency breakdown keyed by ISO 4217 code
        first_order_date:
          type: string
          format: date
          nullable: true
        last_order_date:
          type: string
          format: date
          nullable: true
        orders:
          type: array
          items:
            $ref: "#/components/schemas/PartyOrderSummary"

    PartyReportResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PartyReportData"

    InvoiceRequest:
      type: object
      description: All fields are optional. order_id is taken from the path parameter.
      properties:
        issue_date:
          type: string
          format: date
          description: Invoice issue date (YYYY-MM-DD); defaults to today if omitted
          example: "2026-04-22"
        invoice_note:
          type: string
          description: Optional free-text note embedded in the UBL document
          example: Thank you for your order
        tax_rate:
          type: number
          minimum: 0
          maximum: 1
          description: Tax rate as a decimal (e.g. 0.1 for 10% GST); defaults to 0
          example: 0.1

    InvoiceLineItem:
      type: object
      properties:
        line_id:
          type: string
          example: "1"
        description:
          type: string
          example: Wireless Keyboard
        quantity:
          type: number
          example: 2
        unit_price:
          type: number
          example: 49.99
        unit_code:
          type: string
          example: EA
        line_total:
          type: number
          description: quantity * unit_price (pre-calculated)
          example: 99.98

    InvoiceTotals:
      type: object
      properties:
        line_extension_amount:
          type: number
          description: Sum of all line totals before tax
          example: 99.98
        tax_amount:
          type: number
          description: Tax applied to line_extension_amount
          example: 10.00
        tax_inclusive_amount:
          type: number
          description: line_extension_amount + tax_amount
          example: 109.98
        payable_amount:
          type: number
          description: Final amount due
          example: 109.98

    InvoiceResult:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
          description: Generated UUID for this invoice
        order_id:
          type: string
          format: uuid
          description: The originating order ID
        issue_date:
          type: string
          format: date
        currency:
          type: string
          example: AUD
        buyer:
          $ref: "#/components/schemas/Party"
        seller:
          $ref: "#/components/schemas/Party"
        invoice_lines:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineItem"
        totals:
          $ref: "#/components/schemas/InvoiceTotals"
        invoice_note:
          type: string
        ubl_xml:
          type: string
          description: Generated UBL 2.1 Invoice XML document