openapi: 3.0.3
info:
  title: Northbound - Order Creation SaaS API
  description: |
    A SaaS API for generating and managing standardized UBL 2.1 Order documents.
    This service facilitates the procurement process between Buyer and Seller parties.

    **Paths:** Order routes are mounted at **`/orders`**. The same router is also mounted at **`/v1/orders`**
    for backward compatibility — every operation is available under both prefixes (e.g. `PUT /orders/{id}/change`
    and `PUT /v1/orders/{id}/change` are equivalent).
  version: "1.2.0"

servers:
  - url: https://northbound-w6b3.onrender.com
    description: Production (Render)
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: Orders

security:
  - bearerAuth: []

paths:
  /:
    get:
      tags: [Health]
      summary: Redirect to API documentation
      description: The service root redirects browsers and clients to the interactive OpenAPI UI.
      security: []
      responses:
        "302":
          description: Redirect to `/docs`
          headers:
            Location:
              schema:
                type: string
                example: /docs

  /health:
    get:
      tags: [Health]
      summary: Service Health Check
      description: Returns the aliveness status and basic runtime info for the service.
      security: []
      responses:
        "200":
          description: Service is operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: User Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Server misconfiguration (e.g. missing JWT secret) or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /auth/register:
    post:
      tags: [Auth]
      summary: User Registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Server misconfiguration (e.g. missing JWT secret) or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request Password Reset
      description: Sends a password reset token to the provided email address. Always returns 200 to prevent user enumeration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Request processed (regardless of whether the email exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset Password
      description: Resets the user's password using a valid one-time token received via email. Tokens expire after 1 hour.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "400":
          description: Invalid or expired token, or password too short
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: User Logout
      description: Logs out the current user by revoking the provided bearer token.
      requestBody:
        required: false
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "401":
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Server misconfiguration or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
                
  /orders:
    post:
      tags: [Orders]
      summary: Generate and store UBL Order
      description: |
        Creates a new Order from structured JSON input, generates a UBL 2.1 Order XML document,
        stores it, and returns the created order identifier and XML.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        "201":
          description: Order created and UBL XML generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedOrderResponse"
        "400":
          description: Missing mandatory fields or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "422":
          description: UBL schema validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
    get:
      tags: [Orders]
      summary: List Orders
      description: Returns all order rows from storage (no query filters are applied).
      responses:
        "200":
          description: List of order rows from storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "500":
          description: Supabase not configured or list failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/generate:
    post:
      tags: [Orders]
      summary: Generate and store UBL Order (/generate alias)
      description: Generates and stores an order from structured JSON input.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        "201":
          description: Order created and UBL XML generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedOrderResponse"
        "400":
          description: Missing mandatory fields or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "422":
          description: UBL schema validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"


  /orders/recurring:
    post:
      tags: [Orders]
      summary: Create a recurring order
      description: Creates a recurring order template that repeats on a defined schedule. The order template is stored and can be retrieved, updated, or deleted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringOrderCreateRequest"
      responses:
        "201":
          description: Recurring order created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RecurringOrderObject"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/recurring/{orderID}:
    patch:
      tags: [Orders]
      summary: Update a recurring order
      description: Partially updates an existing recurring order template. Only provided fields are updated. If order_lines is provided, they replace all existing lines.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringOrderUpdateRequest"
      responses:
        "200":
          description: Recurring order updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RecurringOrderObject"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Recurring order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

    delete:
      tags: [Orders]
      summary: Delete a recurring order
      description: Deletes a recurring order template and its associated order lines. Returns the deleted order ID.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Recurring order deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          orderID:
                            type: string
                            format: uuid
        "404":
          description: Recurring order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"


  /orders/{orderID}:
    get:
      tags: [Orders]
      summary: Retrieve Order by ID
      description: Returns the stored order row for a given ID. Same path under `/v1/orders/{orderID}`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderGetResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or retrieval failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/xml:
    get:
      tags: [Orders]
      summary: Retrieve UBL Order XML by ID
      description: Returns the UBL 2.1 Order XML document for a given order ID.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: UBL XML document
          content:
            application/xml:
              schema:
                type: string
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/party-country:
    patch:
      tags: [Orders]
      summary: Update buyer or seller country for an existing order
      description: >
        Updates the ISO country code on the buyer or seller party for this order and returns
        regenerated UBL XML. Order currency is not changed. Also available as
        `PATCH /v1/orders/{orderID}/party-country`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartyCountryRequest"
            examples:
              updateBuyerCountry:
                summary: Update buyer country
                value:
                  role: buyer
                  country: AU
      responses:
        "200":
          description: Party country updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePartyCountryResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Failed to update party country (e.g. Supabase or regeneration error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/change:
    put:
      tags: [Orders]
      summary: Replace an existing order (full payload)
      description: |
        Replaces the order with a full new body (same JSON shape as `POST /orders`), updates
        parties and line items, and returns regenerated UBL XML. The order **id** does not change.
        Requires Supabase env vars. Same path under `/v1/orders/{orderID}/change`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
            examples:
              fullReplace:
                summary: Full order body (same as create)
                value:
                  buyer:
                    external_id: BUYER-001
                    name: Example Buyer Pty Ltd
                  seller:
                    external_id: SELLER-001
                    name: Example Seller Pty Ltd
                  currency: AUD
                  issue_date: "2025-03-15"
                  order_note: Updated shipment
                  order_lines:
                    - line_id: "1"
                      description: Wireless Keyboard
                      quantity: 3
                      unit_price: 49.99
                      unit_code: EA
      responses:
        "200":
          description: Order updated; new UBL XML returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatedOrderResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/cancel:
    post:
      tags: [Orders]
      summary: Cancel an order
      description: |
        Deletes the order and its line items. Requires Supabase env vars.
        Same path under `/v1/orders/{orderID}/cancel`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelledOrderResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or cancel failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/response:
    post:
      tags: [Orders]
      summary: Generate UBL OrderResponse for an order
      description: >
        Verifies the order exists in storage, then returns a minimal UBL 2.1 **OrderResponse** document
        that references this order (`cac:OrderReference`), including a response code (e.g. ACCEPTED).
        Does not persist the document. Same path under `/v1/orders/{orderID}/response`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderResponseRequest"
      responses:
        "201":
          description: OrderResponse XML generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/OrderResponseCreated"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

  /orders/{orderID}/detail:
    patch:
      tags: [Orders]
      summary: Patch order header fields (non-recurring)
      description: >
        Partially updates `currency`, `issue_date`, and/or `order_note` on a **non-recurring** order,
        then regenerates and returns UBL Order XML. Recurring templates must use
        `PATCH /orders/recurring/{orderID}`. Same path under `/v1/orders/{orderID}/detail`.
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderDetailPatchRequest"
      responses:
        "200":
          description: Order updated; new UBL Order XML returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/OrderDetailPatched"
        "400":
          description: Validation failed or order is recurring (use recurring patch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"
        "500":
          description: Supabase not configured or update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Supply as: Authorization: Bearer <token>'

  schemas:
    StandardResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully.
        data:
          type: object
          nullable: true
          description: Payload specific to the endpoint.
        error:
          type: object
          nullable: true
          description: Error information if success is false.

    StandardErrorResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            success:
              example: false
            data:
              nullable: true
              example: null
            error:
              $ref: "#/components/schemas/ErrorDetail"

    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/StandardErrorResponse"
        - type: object
          properties:
            error:
              allOf:
                - $ref: "#/components/schemas/ErrorDetail"
                - type: object
                  properties:
                    validationErrors:
                      type: array
                      items:
                        $ref: "#/components/schemas/ValidationError"

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: One or more fields are invalid.

    ValidationError:
      type: object
      properties:
        field:
          type: string
          example: buyer.external_id
        message:
          type: string
          example: buyer.external_id is required

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: UP
        uptime:
          type: number
          description: Server uptime in seconds since process start
          example: 0
        version:
          type: string
          description: Application version (from npm package when set)
          example: "1.0.0"

    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/HealthStatus"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, passwordConfirm]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        passwordConfirm:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: The reset token received via email
        newPassword:
          type: string
          description: New password (minimum 8 characters)
          minLength: 8

    AuthToken:
      type: object
      properties:
        userID:
          type: integer
          example: 123
        token:
          type: string

    AuthResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthToken"

    OrderCreateRequest:
      type: object
      required: [buyer, seller, currency, issue_date, order_lines]
      properties:
        buyer:
          $ref: "#/components/schemas/Party"
        seller:
          $ref: "#/components/schemas/Party"
        currency:
          type: string
          description: ISO 4217 currency code
          example: AUD
        issue_date:
          type: string
          format: date
          description: Order date (YYYY-MM-DD)
          example: "2025-03-10"
        order_note:
          type: string
          description: Optional note for the order
        order_lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderLine"

    Party:
      type: object
      required: [external_id, name]
      properties:
        external_id:
          type: string
          description: Unique identifier for the party (e.g. from your system)
          example: BUYER-001
        name:
          type: string
          example: Example Buyer Pty Ltd
        email:
          type: string
          format: email
        street:
          type: string
        city:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: AU
        postal_code:
          type: string

    OrderLine:
      type: object
      required: [line_id, description, quantity, unit_price]
      properties:
        line_id:
          type: string
          description: Line identifier (e.g. "1", "2")
          example: "1"
        description:
          type: string
          example: Wireless Keyboard
        quantity:
          type: number
          minimum: 0
          example: 2
        unit_price:
          type: number
          minimum: 0
          example: 49.99
        unit_code:
          type: string
          description: Unit of measure (defaults to EA if omitted)
          example: EA

    CreatedOrder:
      type: object
      properties:
        orderID:
          type: string
          format: uuid
        ubl_xml:
          type: string
          description: Generated UBL 2.1 Order XML document

    CreatedOrderResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreatedOrder"

    UpdatedOrderResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreatedOrder"
              description: Same shape as create — orderID unchanged, ubl_xml regenerated

    CancelledOrder:
      type: object
      properties:
        orderID:
          type: string
          format: uuid
      required: [orderID]

    CancelledOrderResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CancelledOrder"

    OrderSummary:
      type: object
      description: >
        Raw order row(s) from storage (Supabase `orders` table). Fields follow the DB schema
        (e.g. `id`, `buyer_id`, `seller_id`, timestamps may use snake_case); not a denormalized DTO.
      additionalProperties: true

    OrderObject:
      type: object
      description: Same shape as a single list entry — raw order row from storage.
      additionalProperties: true

    OrderListResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/OrderSummary"

    OrderGetResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponse"
        - type: object
          properties:
            data:
